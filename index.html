.dest-opt{width:100%;padding:11px 13px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px}
.dest-opt.on{border-color:var(--uc)}
.dest-ico{width:30px;height:30px;border-radius:7px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.dest-opt.on .dest-ico{background:var(--uc)}

@media print{.sticky-top,.btns-row,.btn-full,.tbl-acts,.btn-del,.overlay{display:none!important}}

<body>
<div id="app"></div>
<script>
'use strict';

// ── CONFIGURACION ────────────────────────────────────────────────────
// Pega aqui la URL de tu GAS web app despues de desplegarlo
const API_URL = 'https://script.google.com/macros/s/AKfycbzbrakCIFL2aCmd2JPuVheHm3uv_NUmt6MkUgOD92tsLO2BLw4EUlM0vJSaUzDKLVun/exec';   // Ej: 'https://script.google.com/macros/s/XXX/exec'

const SK   = 'mff_v4';
const UK   = 'mff_usuario';
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ANOS  = [2024,2025,2026,2027,2028];

const FILAS_BASE = [
  {id:1,rubro:'Pago de la casa',        monto:1500000,vence:'Dia 19', pG:50, estado:'Pendiente'},
  {id:2,rubro:'Alimentacion',            monto:1400000,vence:'Mensual',pG:50, estado:'Pendiente'},
  {id:3,rubro:'Refuerzos de Ian',        monto:240000, vence:'Mensual',pG:50, estado:'Pendiente'},
  {id:4,rubro:'Transporte de Ian',       monto:150000, vence:'Dia 5',  pG:50, estado:'Pendiente'},
  {id:5,rubro:'Cuidadora Valentina',     monto:144000, vence:'Mensual',pG:50, estado:'Pendiente'},
  {id:6,rubro:'Cuidadora Maria Liliana', monto:200000, vence:'Mensual',pG:50, estado:'Pendiente'},
  {id:7,rubro:'Internet',                monto:85000,  vence:'Dia 14', pG:50, estado:'Pendiente'},
  {id:8,rubro:'Universidad Saudith',     monto:0,      vence:'Manual', pG:0,  estado:'Pendiente'},
  {id:9,rubro:'Universidad Gerson',      monto:0,      vence:'N/A',    pG:100,estado:'Gratuidad'},
];

const G_CATS = ['Alimentacion','Transporte','Salud','Educacion','Entretenimiento','Ropa','Servicios','Deuda','Personal','Otro'];
const I_CATS = ['Salario','Proyecto / Freelance','Negocio','Inversion','Regalo','Otro'];
const EMO = {
  'Alimentacion':'meal','Transporte':'bus','Salud':'pill','Educacion':'book',
  'Entretenimiento':'tv','Ropa':'shirt','Servicios':'zap','Deuda':'card',
  'Personal':'user','Salario':'brief','Proyecto / Freelance':'laptop',
  'Negocio':'bldg','Inversion':'chart','Regalo':'gift','Aporte':'pig','Otro':'box'
};
const EMO_CHAR = {meal:'🍽️',bus:'🚌',pill:'💊',book:'📚',tv:'🎬',shirt:'👕',zap:'⚡',card:'💳',user:'👤',brief:'💼',laptop:'💻',bldg:'🏢',chart:'📈',gift:'🎁',pig:'🐷',box:'📦'};
function emo(cat){return EMO_CHAR[EMO[cat]] || '📦';}

// ── STATE ────────────────────────────────────────────────────────────
const hoy = new Date();
let usuario    = localStorage.getItem(UK);
let view       = 'matriz';
let modal      = null;
let form       = {};
let syncStatus = API_URL ? 'loading' : 'local';
let matrizTimer = null;
var modalProy = false;
var expFila = {};
var formProy = {};

let st = {
  mes:hoy.getMonth(), ano:hoy.getFullYear(), filas:[],
  gerson:{ingresos:[],gastos:[]}, saudith:{ingresos:[],gastos:[]}, fondo:[],
  proyectos:[], proyectoAportes:[],
};

// ── HELPERS ──────────────────────────────────────────────────────────
function cop(v){
  if(v===null||v===undefined||v===''||isNaN(+v))return'--';
  return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(+v);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function clamp(v,a,b){var n=+v;return isNaN(n)?a:Math.min(b,Math.max(a,n));}
function fmtDate(d){
  if(!d||d==='undefined'||d==='null'||d==='')return'Sin fecha';
  var dt=new Date(d+'T12:00:00');
  if(isNaN(dt.getTime()))return'Sin fecha';
  return dt.toLocaleDateString('es-CO',{day:'2-digit',month:'short'});
}
function todayStr(){return new Date().toISOString().split('T')[0];}
function uc(){return usuario==='gerson'?'#3b82f6':'#8b5cf6';}
function uname(u){return u==='gerson'?'Gerson':'Saudith';}
function other(){return usuario==='gerson'?'saudith':'gerson';}

// ── PERSISTENCIA LOCAL ───────────────────────────────────────────────
function guardarLocal(){
  try{localStorage.setItem(SK,JSON.stringify({mes:st.mes,ano:st.ano,filas:st.filas,gerson:st.gerson,saudith:st.saudith,fondo:st.fondo,proyectos:st.proyectos,proyectoAportes:st.proyectoAportes}));}
  catch(e){console.warn('storage:',e);}
}
function cargarLocal(){
  try{
    var raw=localStorage.getItem(SK);if(!raw)throw 0;
    var g=JSON.parse(raw);
    st.mes=g.mes!==undefined?g.mes:st.mes;
    st.ano=g.ano!==undefined?g.ano:st.ano;
    var ff=g.filas||[];
    st.filas=ff.length?ff.map(function(f){return{id:+f.id||0,rubro:String(f.rubro||'Item'),monto:isNaN(+f.monto)?0:+f.monto,vence:String(f.vence||'Mensual'),pG:clamp(f.pG,0,100),estado:['Pendiente','Pagado','Gratuidad'].indexOf(f.estado)>=0?f.estado:'Pendiente'};}):FILAS_BASE.map(function(f){return Object.assign({},f);});
    st.gerson ={ingresos:(g.gerson &&g.gerson.ingresos)||[],gastos:(g.gerson &&g.gerson.gastos)||[]};
    st.saudith={ingresos:(g.saudith&&g.saudith.ingresos)||[],gastos:(g.saudith&&g.saudith.gastos)||[]};
    st.fondo  =g.fondo||[];
    st.proyectos=g.proyectos||[];
    st.proyectoAportes=g.proyectoAportes||[];
  }catch(e){
    st.filas=FILAS_BASE.map(function(f){return Object.assign({},f);});
  }
}

// ── API SYNC ─────────────────────────────────────────────────────────
function setSyncDot(s){
  syncStatus=s;
  var el=document.getElementById('sync-dot');
  if(!el)return;
  var icons={ok:'🟢',syncing:'🔄',error:'🔴',loading:'⏳',local:'⚪'};
  var tips={ok:'Sincronizado con Google Sheets',syncing:'Guardando...',error:'Sin conexion - datos guardados en local',loading:'Cargando datos...',local:'Modo local (configura API_URL para sincronizar)'};
  el.textContent=icons[s]||'⚪';
  el.title=tips[s]||'';
}

function postAPI(action,payload){
  if(!API_URL){setSyncDot('local');return;}
  setSyncDot('syncing');
  guardarLocal();
  // Determinar qué parámetro usar según la acción
  var paramKey = action==='addMovimiento' ? 'mov'
               : action==='saveMatriz'    ? 'filas'
               : action==='addProyecto'   ? 'proyecto'
               : null;
  if(!paramKey){setSyncDot('error');return;}
  var paramVal = action==='saveMatriz' ? payload.filas : payload[paramKey];
  var url = API_URL+'?action='+action+'&'+paramKey+'='+encodeURIComponent(JSON.stringify(paramVal));
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){setSyncDot(d.ok?'ok':'error');})
    .catch(function(){setSyncDot('error');});
}

// Merge movimientos: preserva locales no llegados aun al Sheet
function mergeMovs(local,remote){
  var ids={};remote.forEach(function(m){ids[String(m.id)]=true;});
  return remote.concat(local.filter(function(m){return !ids[String(m.id)];}));
}
function mergeUser(loc,rem){
  return{ingresos:mergeMovs(loc.ingresos||[],rem.ingresos||[]),
         gastos:  mergeMovs(loc.gastos||[],  rem.gastos||[])};
}

function cargarDesdeAPI(){
  if(!API_URL){setSyncDot('local');return;}
  setSyncDot('loading');
  fetch(API_URL+'?action=getData')
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.ok)throw new Error(data.error||'Error API');
      if(data.filas&&data.filas.length){
        st.filas=data.filas;
      } else if(st.filas.length){
        guardarMatrizAPI();
      }
      if(data.gerson) st.gerson =mergeUser(st.gerson, data.gerson);
      if(data.saudith)st.saudith=mergeUser(st.saudith,data.saudith);
      if(data.fondo)  st.fondo  =data.fondo;
      if(data.proyectos)       st.proyectos=data.proyectos;
      if(data.proyectoAportes) st.proyectoAportes=data.proyectoAportes;
      guardarLocal();
      setSyncDot('ok');
      render();
    })
    .catch(function(e){console.warn('API:',e);setSyncDot('error');});
}

function guardarMatrizAPI(){
  guardarLocal();
  if(!API_URL)return;
  clearTimeout(matrizTimer);
  matrizTimer=setTimeout(function(){
    postAPI('saveMatriz',{filas:st.filas});
  },2000);
}

// ── CALCULATIONS ─────────────────────────────────────────────────────
function totMatriz(){
  var m=0,g=0,s=0;
  st.filas.forEach(function(f){var v=+f.monto;if(isNaN(v))return;m+=v;g+=v*f.pG/100;s+=v*(100-f.pG)/100;});
  return{monto:m,gerson:g,saudith:s};
}
function calcU(uid){
  var ud=st[uid];
  var ing    =ud.ingresos.reduce(function(s,i){return s+i.monto;},0);
  var gpReal =ud.gastos.filter(function(g){return g.dest==='personal'&&g.registro!=='presupuesto';}).reduce(function(s,g){return s+g.monto;},0);
  var gpPres =ud.gastos.filter(function(g){return g.dest==='personal'&&g.registro==='presupuesto';}).reduce(function(s,g){return s+g.monto;},0);
  var gfReal =ud.gastos.filter(function(g){return g.dest==='familiar';}).reduce(function(s,g){return s+g.monto;},0);
  var apts   =0; // el fondo acumulado ya no se usa
  var proyApts=st.proyectoAportes.filter(function(a){return a.user===uid;}).reduce(function(s,a){return s+a.monto;},0);
  return{ing:ing,gpReal:gpReal,gpPres:gpPres,gfReal:gfReal,gp:gpReal+gpPres,apts:apts,proyApts:proyApts,saldo:ing-gpReal-gfReal-proyApts,saldoPres:ing-gpReal-gpPres-gfReal-proyApts};
}
function calcFondo(){
  var aps=st.fondo.filter(function(m){return m.tipo==='aporte';}).reduce(function(s,m){return s+m.monto;},0);
  var gts=st.fondo.filter(function(m){return m.tipo==='gasto'; }).reduce(function(s,m){return s+m.monto;},0);
  return{bal:aps-gts,aps:aps,gts:gts,
    myAps :st.fondo.filter(function(m){return m.tipo==='aporte'&&m.user===usuario;}).reduce(function(s,m){return s+m.monto;},0),
    othAps:st.fondo.filter(function(m){return m.tipo==='aporte'&&m.user===other();}).reduce(function(s,m){return s+m.monto;},0),
  };
}

// ── RENDER ───────────────────────────────────────────────────────────
var APP=document.getElementById('app');

function render(){
  if(!usuario){renderBienvenida();return;}
  document.documentElement.style.setProperty('--uc',uc());
  var my=calcU(usuario);
  APP.innerHTML=
    '<div class="sticky-top">'+
      '<div class="hdr" style="background:'+uc()+'">'+
        '<div class="hdr-top">'+
          '<span class="hdr-logo">🏠 Finanzas del Hogar</span>'+
          '<div class="hdr-right">'+
            '<span class="sync-dot" id="sync-dot" onclick="cargarDesdeAPI()"></span>'+
            '<button class="btn-cambiar" onclick="cambiarU()">&#8644; cambiar</button>'+
          '</div>'+
        '</div>'+
        '<div class="hdr-lbl">'+uname(usuario)+' &bull; saldo real disponible</div>'+
        '<div class="hdr-saldo">'+cop(my.saldo)+'</div>'+

function mkTab(id,ico,lbl){

function blurOnEnter(el,e){if(e.key==="Enter")el.blur();}
function ciclarEst(id){
  var ests=['Pendiente','Pagado','Gratuidad'];
  st.filas=st.filas.map(function(f){
    if(f.id!==+id)return f;
    var next=ests[(ests.indexOf(f.estado)+1)%ests.length];
    return Object.assign({},f,{estado:next});
  });
  guardarMatrizAPI();render();
}
function toggleFila(id){expFila[id]=!expFila[id];render();}

      '<div style="display:flex;gap:8px">'+
        '<div style="flex:1;background:#eff6ff;border-radius:8px;padding:6px 10px">'+

        '</div>'+
        '<div style="flex:1;background:#f5f3ff;border-radius:8px;padding:6px 10px">'+
          '<div style="font-size:10px;color:#5b21b6;font-weight:600;margin-bottom:2px">Saudith '+pS2+'%</div>'+
          '<div style="font-size:14px;font-weight:700;color:#5b21b6">'+cop(aS)+'</div>'+

  // Total bar al fondo
  var totalBar='<div style="background:#1e3a5f;border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:4px">'+
    '<span style="color:rgba(255,255,255,.7);font-size:12px;font-weight:600">TOTAL PASIVOS</span>'+
    '<div style="text-align:right">'+
      '<div style="color:white;font-size:18px;font-weight:700">'+cop(tot.monto)+'</div>'+

  return resumen+sels+acts+tarjetas+totalBar;

function vFamilia(){
  var tot=totMatriz();
  var pag=st.filas.filter(function(f){return f.estado==='Pagado';}).length;
  var total=st.filas.filter(function(f){return f.estado!=='Gratuidad';}).length;
  var prog=total>0?Math.round(pag/total*100):0;
  var gFamTot=(st.gerson.gastos||[]).filter(function(g){return g.dest==='familiar';}).reduce(function(s,g){return s+g.monto;},0);
  var sFamTot=(st.saudith.gastos||[]).filter(function(g){return g.dest==='familiar';}).reduce(function(s,g){return s+g.monto;},0);
  var resumen=
    '<div class="crd c-full" style="margin-bottom:12px">'+
      '<div class="crd-lbl">Gastos del Hogar &middot; '+MESES[st.mes]+' '+st.ano+'</div>'+
      '<div class="crd-val">'+cop(gFamTot+sFamTot)+' de '+cop(tot.monto)+'</div>'+
      '<div class="crd-prog"><div class="crd-fill" style="width:'+prog+'%"></div></div>'+
      '<div class="crd-sub" style="margin-top:6px">'+pag+' de '+total+' items pagados</div>'+
    '</div>'+
    '<div class="grid2" style="margin-bottom:14px">'+
      '<div style="background:#eff6ff;border-radius:10px;padding:12px;text-align:center">'+
        '<div style="font-size:11px;color:#1e40af;font-weight:600;margin-bottom:3px">Gerson pago</div>'+
        '<div style="font-weight:700;color:#1e40af;font-size:15px">'+cop(gFamTot)+'</div>'+
      '</div>'+
      '<div style="background:#f5f3ff;border-radius:10px;padding:12px;text-align:center">'+
        '<div style="font-size:11px;color:#5b21b6;font-weight:600;margin-bottom:3px">Saudith pago</div>'+
        '<div style="font-weight:700;color:#5b21b6;font-size:15px">'+cop(sFamTot)+'</div>'+
      '</div>'+
    '</div>';
  var items=st.filas.map(function(f){
    var gDebido=f.monto*f.pG/100;
    var sDebido=f.monto*(100-f.pG)/100;
    var gPag=(st.gerson.gastos||[]).filter(function(g){return g.dest==='familiar'&&String(g.filaId)===String(f.id);}).reduce(function(s,g){return s+g.monto;},0);
    var sPag=(st.saudith.gastos||[]).filter(function(g){return g.dest==='familiar'&&String(g.filaId)===String(f.id);}).reduce(function(s,g){return s+g.monto;},0);
    var gFalta=Math.max(0,gDebido-gPag);
    var sFalta=Math.max(0,sDebido-sPag);
    var gExceso=Math.max(0,gPag-gDebido);
    var sExceso=Math.max(0,sPag-sDebido);
    var cubierto=gFalta===0&&sFalta===0&&f.estado!=='Gratuidad';
    var gratuidad=f.estado==='Gratuidad';
    var borderColor=gratuidad?'#ede9fe':cubierto?'#d1fae5':gPag+sPag>0?'#fde68a':'#e2e8f0';
    var statusDot=gratuidad?'<span style="background:#ede9fe;color:#5b21b6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px">Gratuidad</span>':
                  cubierto?'<span style="background:#d1fae5;color:#065f46;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px">&#10003; Cubierto</span>':
                  gPag+sPag>0?'<span style="background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px">Parcial</span>':
                  '<span style="background:#fef2f2;color:#7f1d1d;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px">Sin pago</span>';
    return'<div style="background:#fff;border-radius:12px;border:1px solid '+borderColor+';padding:13px 14px;margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-size:14px;font-weight:600;color:#1e293b">'+esc(f.rubro)+'</span>'+
        statusDot+
      '</div>'+
      '<div style="font-size:12px;color:#64748b;margin-bottom:8px">'+cop(f.monto)+' total &nbsp;&middot;&nbsp;'+esc(f.vence)+'</div>'+
      (gratuidad?'':
        '<div style="display:flex;gap:8px">'+
          '<div style="flex:1;background:#eff6ff;border-radius:8px;padding:7px 10px">'+
            '<div style="font-size:10px;color:#1e40af;font-weight:600">Gerson &mdash; '+f.pG+'%</div>'+
            '<div style="font-size:12px;color:#1e40af">Debe: '+cop(gDebido)+'</div>'+
            '<div style="font-size:13px;font-weight:700;color:'+(gFalta===0?'#065f46':'#1e40af')+'">Pago: '+cop(gPag)+(gFalta>0?' <span style="color:#dc2626;font-size:11px">Falta '+cop(gFalta)+'</span>':gExceso>0?' <span style="color:#059669;font-size:11px">+'+cop(gExceso)+' de mas</span>':'')+'</div>'+
          '</div>'+
          '<div style="flex:1;background:#f5f3ff;border-radius:8px;padding:7px 10px">'+
            '<div style="font-size:10px;color:#5b21b6;font-weight:600">Saudith &mdash; '+(100-f.pG)+'%</div>'+
            '<div style="font-size:12px;color:#5b21b6">Debe: '+cop(sDebido)+'</div>'+
            '<div style="font-size:13px;font-weight:700;color:'+(sFalta===0?'#065f46':'#5b21b6')+'">Pago: '+cop(sPag)+(sFalta>0?' <span style="color:#dc2626;font-size:11px">Falta '+cop(sFalta)+'</span>':sExceso>0?' <span style="color:#059669;font-size:11px">+'+cop(sExceso)+' de mas</span>':'')+'</div>'+
          '</div>'+
        '</div>'
      )+
    '</div>';
  }).join('');
  return resumen+
    '<div class="sec" style="margin-top:4px">Detalle por item</div>'+
    items;
}

function vProyectos(){
  var todos=st.proyectos.filter(function(p){return p.tipo==='compartido'||p.owner===usuario;});
  var crearBtn='<button class="btn-full" style="background:'+uc()+'" onclick="openModalProyecto()">+ Crear Proyecto</button>';
  if(!todos.length) return crearBtn+empt('🎯','No tienes proyectos aun. Crea uno para empezar a ahorrar.');
  var cards=todos.map(function(p){
    var apts=st.proyectoAportes.filter(function(a){return a.proyectoId===String(p.id);});
    var totalAp=apts.reduce(function(s,a){return s+a.monto;},0);
    var pct=p.meta>0?Math.min(100,Math.round(totalAp/p.meta*100)):0;
    var falta=Math.max(0,p.meta-totalAp);
    var meses=p.aporteMensual>0?Math.ceil(falta/p.aporteMensual):null;
    var color=pct>=100?'#10b981':uc();
    return'<div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;margin-bottom:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<span style="font-size:26px">'+esc(p.emoji||'🎯')+'</span>'+
          '<div>'+
            '<div style="font-weight:700;font-size:15px;color:#1e293b">'+esc(p.nombre)+'</div>'+
            '<div style="font-size:11px;color:#64748b">'+(p.tipo==='compartido'?'&#128101; Compartido':'&#128100; Personal')+'</div>'+
          '</div>'+
        '</div>'+
        '<div style="font-weight:700;color:'+color+';font-size:18px">'+pct+'%</div>'+
      '</div>'+
      '<div style="background:#e2e8f0;border-radius:4px;height:8px;margin-bottom:8px;overflow:hidden">'+
        '<div style="height:100%;background:'+color+';border-radius:4px;width:'+pct+'%"></div>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b">'+
        '<span>Aportado: <strong>'+cop(totalAp)+'</strong></span>'+
        '<span>Meta: <strong>'+cop(p.meta)+'</strong></span>'+
      '</div>'+
      (falta>0?
        '<div style="font-size:11px;color:#64748b;margin-top:4px">'+
          'Falta: '+cop(falta)+
          (meses?' &nbsp;&middot;&nbsp; ~'+meses+' mes'+(meses!==1?'es':''):'')+ 
          (p.fechaLimite&&p.fechaLimite!==''?' &nbsp;&middot;&nbsp; Limite: '+fmtDate(p.fechaLimite):'')+
        '</div>'
        :'<div style="font-size:11px;color:#10b981;font-weight:700;margin-top:4px">&#10003; Meta alcanzada!</div>'
      )+
    '</div>';
  }).join('');
  var recApts=st.proyectoAportes.sort(function(a,b){return new Date(b.fecha)-new Date(a.fecha);}).slice(0,5);
  var recHtml=recApts.length?
    '<div class="tx-list">'+recApts.map(function(a){
      var p=st.proyectos.find(function(p){return String(p.id)===String(a.proyectoId);})||{emoji:'🎯',nombre:'Proyecto'};
      return'<div class="tx-row">'+
        '<div class="tx-ico" style="background:#eff6ff;font-size:16px">'+esc(p.emoji||'🎯')+'</div>'+
        '<div class="tx-info">'+
          '<div class="tx-name">'+esc(p.nombre)+'</div>'+
          '<div class="tx-meta">'+esc(a.descripcion||'Aporte')+' &middot; '+fmtDate(a.fecha)+'</div>'+
        '</div>'+
        '<div class="tx-amt" style="color:'+uc()+'">'+cop(a.monto)+'</div>'+
      '</div>';
    }).join('')+'</div>':
    empt('💰','Sin aportes aun.');
  return crearBtn+cards+'<div class="sec mt">Aportes recientes</div>'+recHtml;
}

function saveProyecto(){
  if(!formProy.nombre||!formProy.meta){alert('Ingresa nombre y meta.');return;}
  var p={
    id:Date.now(),
    emoji:formProy.emoji||'🎯',
    nombre:formProy.nombre,
    meta:parseFloat(formProy.meta)||0,
    aporteMensual:parseFloat(formProy.aporteMensual)||0,
    tipo:formProy.tipo||'personal',
    owner:usuario,
    fechaLimite:formProy.fechaLimite||'',
  };

  postAPI('addProyecto',{proyecto:p});

  view='proyectos';

}

function elegirU(u){usuario=u;localStorage.setItem(UK,u);view='matriz';render();if(API_URL)cargarDesdeAPI();}
function cambiarU(){if(confirm('Cambiar de usuario?')){usuario=null;localStorage.removeItem(UK);render();}}
function setView(v){view=v;render();}
function openModal(type,dest){modalProy=false;modal=type;form={monto:'',descripcion:'',fecha:todayStr(),categoria:type==='ingreso'?'Salario':'Alimentacion',dest:dest||'personal',filaId:'',registro:'real',proyectoId:'',forma:0};render();setTimeout(function(){var el=document.getElementById('fm');if(el)el.focus();},60);}
function setTipo(t){form.registro=t;render();}
function closeModal(){modal=null;render();}
function ovClick(e){if(e.target.classList.contains('overlay'))closeModal();}
function setForma(f){
  form.forma=f;
  if(f===0&&form.filaId){
    var fila=st.filas.find(function(fi){return fi.id===+form.filaId;});
    if(fila){
      var pct=usuario==='gerson'?fila.pG:(100-fila.pG);
      form.monto=Math.round(fila.monto*pct/100);
    }
  } else if(f===1){
    form.monto='';
  }
  render();
}
function setDest(d){form.dest=d;form.registro='real';form.filaId='';form.forma=0;render();}

function selFila(id){
  if(!id)return;
  var f=st.filas.find(function(f){return f.id===+id;});
  if(!f)return;
  form.filaId=+id;
  form.descripcion=f.rubro;
  // Autocompleta monto solo en pago Total
  if(form.forma===0){
    var pct=usuario==='gerson'?f.pG:(100-f.pG);
    form.monto=Math.round(f.monto*pct/100);
  }
  // Categoría automática según el rubro
  var r=f.rubro.toLowerCase();
  if(r.indexOf('alimenta')>=0||r.indexOf('mercado')>=0)form.categoria='Alimentacion';
  else if(r.indexOf('transporte')>=0||r.indexOf('bus')>=0)form.categoria='Transporte';
  else if(r.indexOf('arriendo')>=0||r.indexOf('casa')>=0||r.indexOf('internet')>=0)form.categoria='Servicios';
  else if(r.indexOf('universidad')>=0||r.indexOf('refuerzo')>=0||r.indexOf('colegio')>=0)form.categoria='Educacion';
  else if(r.indexOf('cuidadora')>=0||r.indexOf('salud')>=0)form.categoria='Salud';
  else form.categoria='Otro';
  // NO cambia form.dest — el usuario ya eligió de dónde sale la plata
  form.registro='real';
  render();
}
var guardando=false;
function saveModal(){
  if(guardando)return;
  var m=parseFloat(form.monto);
  if(!m||m<=0){alert('Ingresa un monto valido.');return;}
  guardando=true;
  var id=Date.now();
  var reg=form.registro||'real';
  var base={id:id,monto:m,descripcion:form.descripcion,categoria:form.categoria,fecha:form.fecha,registro:reg};
  var movAPI=null;
  if(modal==='ingreso'){
    st[usuario].ingresos.unshift(base);
    movAPI={id:id,tipo:'ingreso',user:usuario,monto:m,descripcion:form.descripcion,categoria:form.categoria,dest:'',registro:'real',fecha:form.fecha};
  } else if(form.dest==='personal'){
    st[usuario].gastos.unshift(Object.assign({},base,{dest:'personal'}));
    movAPI={id:id,tipo:'gasto_personal',user:usuario,monto:m,descripcion:form.descripcion,categoria:form.categoria,dest:'personal',registro:reg,fecha:form.fecha};
  } else if(form.dest==='familiar'){
    var filaRef=form.filaId?st.filas.find(function(f){return f.id===+form.filaId;}):null;
    st[usuario].gastos.unshift(Object.assign({},base,{dest:'familiar',filaId:form.filaId}));
    movAPI={id:id,tipo:'gasto_familiar',user:usuario,monto:m,descripcion:form.descripcion,categoria:form.categoria,dest:String(form.filaId||''),registro:reg,fecha:form.fecha};
    if(form.forma===0&&filaRef){
      st.filas=st.filas.map(function(f){return f.id===+form.filaId?Object.assign({},f,{estado:'Pagado'}):f;});
      guardarMatrizAPI();
    }
  } else if(form.dest==='proyecto'){
    var apt={id:id,proyectoId:String(form.proyectoId),user:usuario,monto:m,descripcion:form.descripcion||'Aporte',fecha:form.fecha};
    st.proyectoAportes.unshift(apt);
    movAPI={id:id,tipo:'proyecto_aporte',user:usuario,monto:m,descripcion:form.descripcion||'Aporte',categoria:'Proyecto',dest:String(form.proyectoId||''),registro:'real',fecha:form.fecha};
  }
  guardarLocal();
  if(movAPI)postAPI('addMovimiento',{mov:movAPI});
  modal=null;guardando=false;render();
}

function onTxt(el){
  var id=+el.dataset.id,campo=el.dataset.campo,val=el.value.trim();
  st.filas=st.filas.map(function(f){if(f.id!==id)return f;var c=Object.assign({},f);c[campo]=val||f[campo];return c;});
  guardarMatrizAPI();
}
function onNum(el){
  var id=+el.dataset.id,val=el.value===''?0:+el.value;
  st.filas=st.filas.map(function(f){return f.id!==id?f:Object.assign({},f,{monto:val});});
  guardarMatrizAPI();render();
}
function onPct(el){
  var id=+el.dataset.id,val=clamp(el.value,0,100);
  st.filas=st.filas.map(function(f){return f.id!==id?f:Object.assign({},f,{pG:val});});
  guardarMatrizAPI();render();
}
function onEst(sel){
  var id=+sel.dataset.id,val=sel.value;
  st.filas=st.filas.map(function(f){return f.id!==id?f:Object.assign({},f,{estado:val});});
  guardarMatrizAPI();render();
}
function addFila(){
  st.filas.push({id:Date.now(),rubro:'Nuevo item',monto:0,vence:'Mensual',pG:50,estado:'Pendiente'});
  guardarMatrizAPI();render();
  setTimeout(function(){var ins=document.querySelectorAll('.inp-r');var l=ins[ins.length-1];if(l){l.focus();l.select();}},40);
}
function delFila(btn){
  var id=+btn.dataset.id,f=st.filas.find(function(f){return f.id===id;});
  if(!f)return;
  if(st.filas.length<=1){alert('Debe haber al menos un item.');return;}
  if(!confirm('Eliminar "'+f.rubro+'"?'))return;
  st.filas=st.filas.filter(function(f){return f.id!==id;});
  guardarMatrizAPI();render();
}
function resetMatriz(){
  if(!confirm('Reiniciar la Matriz?\n\nSe restauraran los items originales.\nLos ingresos y gastos personales NO se borran.'))return;
  st.filas=FILAS_BASE.map(function(f){return Object.assign({},f);});
  guardarMatrizAPI();render();
}

// ── INIT ──────────────────────────────────────────────────────────────
cargarLocal();
render();
if(usuario&&API_URL)cargarDesdeAPI();
else setSyncDot(API_URL?'loading':'local');
</script>

  <span style="font-size:30px;flex-shrink:0">&#127968;</span>

    <div style="font-size:13px;font-weight:700">Finanzas del Hogar</div>

  </div>
  <button id="pwa-btn" onclick="pwaInstalar()" style="background:#3b82f6;border:none;color:white;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0">Instalar</button>
  <button onclick="document.getElementById('pwa-banner').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:22px;padding:2px 4px;line-height:1;flex-shrink:0">x</button>
</div>

<script>
if('serviceWorker' in navigator && location.protocol === 'https:'){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
var _pwa=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();_pwa=e;
  document.getElementById('pwa-banner').style.display='flex';
});
window.addEventListener('appinstalled',function(){
  document.getElementById('pwa-banner').style.display='none';_pwa=null;
});
function pwaInstalar(){
  if(_pwa){
    _pwa.prompt();
    _pwa.userChoice.then(function(r){
      if(r.outcome==='accepted')document.getElementById('pwa-banner').style.display='none';
      _pwa=null;
    });
  } else {
    alert('En iPhone/Safari:\n1. Toca el boton Compartir (cuadro con flecha arriba)\n2. Toca "Anadir a pantalla de inicio"\n3. Confirma con "Anadir"');
  }
}
var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
var isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
if(isIOS&&!isStandalone){
  document.getElementById('pwa-banner').style.display='flex';
  document.getElementById('pwa-sub').textContent='Toca Compartir y luego Anadir a pantalla de inicio';
  document.getElementById('pwa-btn').textContent='Ver como';
}
</script>
